<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login — Section</title>

    <link rel="stylesheet" href="/static/css/login.css" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />

    <link href="https://fonts.cdnfonts.com/css/raqillas" rel="stylesheet" />

    <link rel="icon" type="image/png" href="/static/assets/logo.png" />
  </head>

  <body>
    <!-- HEADER -->

    <header>
      <div class="logo">
        <img src="/static/assets/logo.png" alt="" />
        <span>Section</span>
      </div>

      <nav>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/products">Products</a></li>
          <li><a href="/about-us">About Us</a></li>
          <li><a href="/contact">Contact Us</a></li>
        </ul>
      </nav>

      <div class="header-actions">
        <!-- Search Bar -->
        <div class="search-bar">
          <input type="text" placeholder="Search..." />
          <i class="fas fa-search"></i>
        </div>

        <!-- Cart Icon -->
        <div class="cart-icon" id="cart-toggle">
          <i class="fas fa-shopping-bag"></i>
          <span class="cart-count">0</span>
        </div>

        <!-- Login / Register Icon -->
        <div class="login-btn">
          <a href="/login"><i class="fa-solid fa-user"></i></a>
        </div>
      </div>
    </header>

    <!-- main -->
    <main class="registration-page">
      <!-- REGISTER -->

      <section class="register-page">
        <div class="register-container">
          <!-- LEFT -->

          <div class="register-content">
            <span class="section-label">WELCOME BACK</span>

            <h1 class="register-title">
              Sign in to
              <span>Section</span>
            </h1>

            <p class="register-subtitle">
              Join thousands of customers discovering premium curated products.
            </p>

            <div class="register-features">
              <div class="feature-item">
                <span class="feature-icon"><i class="fas fa-heart"></i></span>
                <span>Access your saved favorites</span>
              </div>

              <div class="feature-item">
                <span class="feature-icon"><i class="fas fa-box"></i></span>
                <span>Track your latest orders</span>
              </div>

              <div class="feature-item">
                <span class="feature-icon"><i class="fas fa-heart"></i></span>
                <span>Fast and secure checkout</span>
              </div>
            </div>
          </div>

          <!-- RIGHT -->

          <div class="register-card">
            <form class="register-form" id="login-form">
              <div class="form-group">
                <label>Email Address</label>
                <input
                  type="email"
                  placeholder="john@example.com"
                  id="email"
                  required
                />
              </div>

              <div class="form-group">
                <label>Password</label>

                <div class="password-wrapper">
                  <input
                    type="password"
                    placeholder="Minimum 8 characters"
                    id="password"
                    required
                  />

                  <i class="fa-solid fa-eye" id="togglePassword"></i>
                </div>
              </div>

              <p
                id="error-msg"
                style="
                  color: #ff4d4d;
                  font-size: 0.8rem;
                  display: none;
                  margin-bottom: 1rem;
                "
              ></p>
              <div class="form-group"></div>
              <!-- <div class="divider">or</div>

              <div class="social-buttons">
                <button class="social-btn">Google</button>
                <button class="social-btn">Apple</button>
              </div> -->

              <button type="submit" class="cta-button">LOG IN</button>
            </form>

            <div class="register-footer">
              Do not have an account?
              <a href="/register">Create One</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/static/js/auth.js"></script>
  </body>
</html>
