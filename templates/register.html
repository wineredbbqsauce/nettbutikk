<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Register — Section</title>

    <link rel="stylesheet" href="/static/css/register.css" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />

    <link href="https://fonts.cdnfonts.com/css/raqillas" rel="stylesheet" />

    <link rel="icon" type="image/png" href="/static/assets/logo.png" />
  </head>

  <body>
    <!-- HEADER -->

    <header>
      <div class="logo">
        <img src="/static/assets/logo.png" alt="" />
        <span>Section</span>
      </div>

      <nav>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/products">Products</a></li>
          <li><a href="/about-us">About Us</a></li>
          <li><a href="/contact">Contact Us</a></li>
        </ul>
      </nav>

      <div class="header-actions">
        <!-- Search Bar -->
        <div class="search-bar">
          <input type="text" placeholder="Search..." />
          <i class="fas fa-search"></i>
        </div>

        <!-- Cart Icon -->
        <div class="cart-icon" id="cart-toggle">
          <i class="fas fa-shopping-bag"></i>
          <span class="cart-count">0</span>
        </div>

        <!-- Login / Register Icon -->
        <div class="login-btn">
          <a href="/login"><i class="fa-solid fa-user"></i></a>
        </div>
      </div>
    </header>

    <!-- main -->
    <main class="registration-page">
      <!-- REGISTER -->

      <section class="register-page">
        <div class="register-container">
          <!-- LEFT -->

          <div class="register-content">
            <span class="section-label">JOIN SECTION</span>

            <h1 class="register-title">
              Create Your
              <span>Account</span>
            </h1>

            <p class="register-subtitle">
              Join thousands of customers discovering premium curated products.
            </p>

            <div class="register-features">
              <div class="feature-item">
                <span class="feature-icon">✓</span>
                <span>Fast Checkout</span>
              </div>

              <div class="feature-item">
                <span class="feature-icon">✓</span>
                <span>Save Favorites</span>
              </div>

              <div class="feature-item">
                <span class="feature-icon">✓</span>
                <span>Track Orders</span>
              </div>
            </div>
          </div>

          <!-- RIGHT -->

          <div class="register-card">
            <form class="register-form" id="register-form">
              <div class="form-row">
                <div class="form-group">
                  <label>First Name</label>
                  <input
                    type="text"
                    placeholder="John"
                    id="first-name"
                    required
                  />
                </div>

                <div class="form-group">
                  <label>Last Name</label>
                  <input
                    type="text"
                    placeholder="Doe"
                    id="last-name"
                    required
                  />
                </div>
              </div>

              <div class="form-group">
                <label>Email Address</label>
                <input
                  type="email"
                  placeholder="john@example.com"
                  id="email"
                  required
                />
              </div>

              <div class="form-group">
                <label>Password</label>

                <div class="password-wrapper">
                  <input
                    type="password"
                    placeholder="Minimum 8 characters"
                    id="password"
                    required
                  />

                  <i class="fa-solid fa-eye" id="togglePassword"></i>
                </div>
              </div>

              <div class="form-group">
                <label>Confirm Password</label>

                <div class="password-wrapper">
                  <input
                    type="password"
                    placeholder="Repeat password"
                    id="confirmPassword"
                    required
                  />

                  <i class="fa-solid fa-eye" id="toggleConfirmPassword"></i>
                </div>
              </div>

              <button type="submit" class="cta-button">CREATE ACCOUNT</button>
            </form>

            <div class="register-footer">
              Already have an account?
              <a href="/login">Sign in</a>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="/static/js/auth.js"></script>
  </body>
</html>
